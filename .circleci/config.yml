version: 2.1

jobs:
  run_checks:
    docker:
      - image: cimg/node:18.19
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Audit packages
          command: 
            npm audit --audit-level=critical

      - run:
          name: Run tests
          command: npm test


  build_and_push_docker:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - setup_remote_docker

      - run:
          name: Login to Docker Hub
          command: |
            echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - run:
          name: Build Docker image
          command: |
            docker build -t $DOCKER_USERNAME/exampleapp .

      - run:
          name: Push Docker image
          command: |
            docker push $DOCKER_USERNAME/exampleapp


  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - add_ssh_keys:
          fingerprints:
            - "SHA256:gLU0U5XVoxUOCCEIp8UNV90vweATx/PcNcUEijfP+n4"

      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@34.235.1.194 "
              cd ExampleApplication &&
              git pull origin main &&
              npm install &&
              printf \"%b\" \"$PRIVATE_KEY\" > privatekey.pem &&
              printf \"%b\" \"$SERVER\" > server.crt &&
              pm2 restart calculator-app || pm2 start bin/www --name calculator-app
            "


workflows:
  version: 2
  deploy_workflow:
    jobs:
      - run_checks:
          filters:
            branches:
              only: main

      - build_and_push_docker:
          requires:
            - run_checks
          filters:
            branches:
              only: main

      - deploy:
          requires:
            - build_and_push_docker
          filters:
            branches:
              only: main
